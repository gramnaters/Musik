name: beatboss_android
description: BeatBoss — premium cross-platform music player for Android.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2
  
  # Audio playback
  just_audio: ^0.9.43
  just_audio_background: ^0.0.1-beta.13
  audio_service: ^0.18.15
  audio_session: ^0.1.21

  # UI & animations
  cupertino_icons: ^1.0.8
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Storage & preferences
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network
  http: ^1.2.2
  dio: ^5.7.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  palette_generator: ^0.3.3+3
  blur: ^3.1.0
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
